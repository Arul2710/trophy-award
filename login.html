<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TrophyCraft</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <meta name="description" content="Sign in to your TrophyCraft account to manage orders, track shipments, and access your dashboard.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="tailwindcss.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: var(--bg-section);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .dark-toggle-corner {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .auth-page {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .auth-card {
      position: relative;
      overflow: hidden;
      background: var(--bg-card);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      border: 1px solid var(--border-color);
      transition: background 0.3s, box-shadow 0.3s, border-color 0.3s;
    }

    .dark .auth-card {
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--primary));
    }

    .auth-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .auth-header .logo-link {
      display: inline-block;
      text-decoration: none;
      margin-bottom: 16px;
      transition: transform 0.3s ease;
    }

    .auth-header .logo-link:hover {
      transform: scale(1.05);
    }

    .auth-header .logo-link span {
      font-weight: 800;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #b8860b, #e8c25e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .auth-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .auth-header p {
      color: #888;
      font-size: 0.9rem;
    }

    .social-login {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .social-login button {
      flex: 1;
      padding: 10px 0;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background: var(--bg-light);
      color: var(--text-dark);
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .social-login button:hover {
      background: var(--bg-section);
      border-color: var(--primary);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 20px 0;
      color: #888;
      font-size: 0.85rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-dark);
    }

    .form-group .input-wrapper {
      position: relative;
    }

    .form-group .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
      font-size: 0.95rem;
      transition: color 0.3s ease;
      pointer-events: none;
    }

    .form-group .form-control {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      font-size: 0.95rem;
      background: var(--bg-light);
      color: var(--text-dark);
      transition: all 0.2s;
      outline: none;
    }

    .form-group .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(184,134,11,0.15);
    }

    .form-group .input-wrapper input[type="password"] {
      padding-right: 44px;
    }

    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      font-size: 0.95rem;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: var(--primary);
    }

    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 18px;
      font-size: 0.88rem;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .alert.show {
      display: flex;
    }

    .alert-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
    }

    .dark .alert-error {
      background: rgba(220, 38, 38, 0.1);
      border-color: rgba(220, 38, 38, 0.3);
      color: #fca5a5;
    }

    .alert-success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
    }

    .dark .alert-success {
      background: rgba(22, 163, 74, 0.1);
      border-color: rgba(22, 163, 74, 0.3);
      color: #86efac;
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-gold);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .btn-submit .spinner-btn {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .btn-submit.loading .spinner-btn {
      display: inline-block;
    }

    .btn-submit.loading .btn-text {
      display: none;
    }

    .btn-submit.loading .btn-icon {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-card {
      animation: fadeInUp 0.5s ease;
    }

    .auth-footer {
      text-align: center;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--border-color);
    }

    .auth-footer p {
      color: #888;
      font-size: 0.88rem;
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .auth-footer a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .remember-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: normal;
      cursor: pointer;
      font-size: 0.88rem;
      color: #888;
    }

    .remember-row label input[type="checkbox"] {
      accent-color: var(--primary);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .remember-row a {
      color: var(--primary);
      font-size: 0.85rem;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .remember-row a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 28px 20px;
      }
      .social-login {
        flex-direction: column;
      }
      .social-login button {
        padding: 10px;
        font-size: 0.85rem;
      }
      .auth-header .logo-link span {
        font-size: 1.1rem;
      }
    }

    @media (max-width: 360px) {
      .auth-card {
        padding: 20px 16px;
      }
      .auth-page {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="dark-toggle-corner">
    <button class="icon-btn" id="darkModeToggleAuth" aria-label="Toggle dark mode" title="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>
    <button class="icon-btn" id="rtlToggleAuth" aria-label="Toggle RTL layout" title="Toggle RTL layout">
      <i class="fas fa-exchange-alt"></i>
    </button>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo-link" aria-label="Go to homepage">
          <span>Trophy<span style="background: linear-gradient(135deg, #e8c25e, #b8860b); -webkit-background-clip: text; background-clip: text; color: transparent;">Craft</span></span>
        </a>
        <h2>Welcome Back</h2>
        <p>Sign in to your TrophyCraft account</p>
      </div>

      <div id="loginAlert" class="alert alert-error" role="alert">
        <i class="fas fa-exclamation-circle"></i>
        <span id="alertMessage"></span>
      </div>

      <div class="social-login">
        <button type="button" aria-label="Sign in with Google">
          <i class="fab fa-google"></i> Google
        </button>
        <button type="button" aria-label="Sign in with Facebook">
          <i class="fab fa-facebook-f"></i> Facebook
        </button>
        <button type="button" aria-label="Sign in with Apple">
          <i class="fab fa-apple"></i> Apple
        </button>
      </div>

      <div class="divider">or continue with email</div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required autocomplete="email" inputmode="email">
            <i class="far fa-envelope"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-wrapper">
            <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required autocomplete="current-password" minlength="6">
            <i class="fas fa-lock"></i>
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility" tabindex="-1">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="remember-row">
          <label>
            <input type="checkbox" id="rememberMe" checked> Remember Me
          </label>
          <a href="#" id="forgotPassword">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-submit" id="loginBtn">
          <i class="fas fa-sign-in-alt btn-icon"></i>
          <span class="btn-text">Sign In</span>
          <span class="spinner-btn"></span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Create Account</a></p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var savedTheme = localStorage.getItem('trophyTheme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark');
      }

      var toggleBtn = document.getElementById('darkModeToggleAuth');
      if (toggleBtn) {
        if (document.body.classList.contains('dark')) {
          toggleBtn.innerHTML = '<i class="fas fa-sun"></i>';
        }

        toggleBtn.addEventListener('click', function() {
          document.body.classList.toggle('dark');
          var isDark = document.body.classList.contains('dark');
          this.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
          localStorage.setItem('trophyTheme', isDark ? 'dark' : 'light');
        });
      }

      var rtlBtn = document.getElementById('rtlToggleAuth');
      var htmlEl = document.documentElement;
      var savedDir = localStorage.getItem('trophyDir');
      if (savedDir === 'rtl') {
        htmlEl.setAttribute('dir', 'rtl');
        htmlEl.setAttribute('lang', 'ar');
      }
      if (rtlBtn) {
        rtlBtn.addEventListener('click', function() {
          var isRtl = htmlEl.getAttribute('dir') === 'rtl';
          if (isRtl) {
            htmlEl.setAttribute('dir', 'ltr');
            htmlEl.setAttribute('lang', 'en');
            localStorage.setItem('trophyDir', 'ltr');
          } else {
            htmlEl.setAttribute('dir', 'rtl');
            htmlEl.setAttribute('lang', 'ar');
            localStorage.setItem('trophyDir', 'rtl');
          }
        });
      }

      var passwordInput = document.getElementById('loginPassword');
      var passwordToggle = document.getElementById('passwordToggle');

      if (passwordToggle && passwordInput) {
        passwordToggle.addEventListener('click', function() {
          var type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          this.querySelector('i').className = type === 'password' ? 'far fa-eye' : 'far fa-eye-slash';
        });
      }

      var form = document.getElementById('loginForm');
      var alertEl = document.getElementById('loginAlert');
      var alertMessage = document.getElementById('alertMessage');
      var loginBtn = document.getElementById('loginBtn');

      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();

          alertEl.classList.remove('show', 'alert-error', 'alert-success');

          var email = document.getElementById('loginEmail').value.trim();
          var password = document.getElementById('loginPassword').value;

          if (!email) {
            showAlert('Please enter your email address.', 'error');
            document.getElementById('loginEmail').focus();
            return;
          }

          if (!isValidEmail(email)) {
            showAlert('Please enter a valid email address.', 'error');
            document.getElementById('loginEmail').focus();
            return;
          }

          if (!password) {
            showAlert('Please enter your password.', 'error');
            document.getElementById('loginPassword').focus();
            return;
          }

          if (password.length < 6) {
            showAlert('Password must be at least 6 characters.', 'error');
            document.getElementById('loginPassword').focus();
            return;
          }

          loginBtn.classList.add('loading');

          setTimeout(function() {
            loginBtn.classList.remove('loading');
            window.location.href = 'user-dashboard.html';
          }, 1200);
        });
      }

      function showAlert(message, type) {
        alertMessage.textContent = message;
        alertEl.className = 'alert show ' + (type === 'error' ? 'alert-error' : 'alert-success');
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      var forgotLink = document.getElementById('forgotPassword');
      if (forgotLink) {
        forgotLink.addEventListener('click', function(e) {
          e.preventDefault();
          showAlert('Password reset link has been sent to your email.', 'success');
        });
      }

      document.querySelectorAll('.social-login button').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var provider = this.textContent.trim();
          loginBtn.classList.add('loading');

          setTimeout(function() {
            loginBtn.classList.remove('loading');
            showAlert('Redirecting to ' + provider + ' login...', 'success');
          }, 800);
        });
      });
    })();
  </script>
</body>
</html>
