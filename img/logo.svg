<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 130" width="420" height="130">
  <defs>
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="40%" stop-color="#f0d68a"/>
      <stop offset="60%" stop-color="#e8c25e"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d68a"/>
      <stop offset="100%" stop-color="#c49a2c"/>
    </linearGradient>
    <linearGradient id="goldT" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#e8c25e"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Shield emblem -->
  <g transform="translate(8, 8)">
    <path d="M32 2 L58 2 L58 2 Q60 2 60 4 L60 48 Q60 62 45 70 Q30 62 30 48 L30 4 Q30 2 32 2 Z" fill="#1a1a2e" stroke="url(#goldG)" stroke-width="2.5"/>
    <!-- Inner shield -->
    <path d="M36 8 L54 8 L54 44 Q54 56 45 62 Q36 56 36 44 Z" fill="none" stroke="url(#goldH)" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Trophy cup inside shield -->
    <path d="M40 18 L38 18 Q36 18 36 20 L36 32 Q36 38 40 40 L50 40 Q54 38 54 32 L54 20 Q54 18 52 18 Z" fill="url(#goldG)" opacity="0.9"/>
    <path d="M36 21 Q32 21 32 25 Q32 29 35 29" fill="none" stroke="url(#goldG)" stroke-width="2" stroke-linecap="round"/>
    <path d="M54 21 Q58 21 58 25 Q58 29 55 29" fill="none" stroke="url(#goldG)" stroke-width="2" stroke-linecap="round"/>
    <rect x="35" y="40" width="20" height="3" rx="1.5" fill="url(#goldG)"/>
    <rect x="38" y="43" width="14" height="2" rx="1" fill="#b8860b"/>
    
    <!-- Star on cup body -->
    <polygon points="45,24 46.5,28 50.5,28 47.5,30.5 48.5,35 45,32 41.5,35 42.5,30.5 39.5,28 43.5,28" fill="#fff" opacity="0.5"/>
    
    <!-- Laurel left -->
    <path d="M32 10 Q26 18 28 28" fill="none" stroke="url(#goldG)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M32 10 Q30 14 30 18" fill="none" stroke="#f0d68a" stroke-width="1" stroke-linecap="round"/>
    <path d="M30 18 Q28 22 28 28" fill="none" stroke="#f0d68a" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Laurel right -->
    <path d="M58 10 Q64 18 62 28" fill="none" stroke="url(#goldG)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M58 10 Q60 14 60 18" fill="none" stroke="#f0d68a" stroke-width="1" stroke-linecap="round"/>
    <path d="M60 18 Q62 22 62 28" fill="none" stroke="#f0d68a" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Text "Trophy" -->
  <text x="78" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700" fill="#b8860b" letter-spacing="1.5">TROPHY</text>
  
  <!-- Text "Craft" -->
  <text x="78" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700" fill="url(#goldT)" letter-spacing="1.5">Craft</text>

  <!-- Tagline -->
  <text x="78" y="112" font-family="Arial, sans-serif" font-size="9" fill="#b8860b" letter-spacing="3.5" font-weight="600" opacity="0.8">CUSTOM TROPHIES &amp; AWARDS</text>

  <!-- Decorative line under text -->
  <line x1="78" y1="100" x2="400" y2="100" stroke="url(#goldT)" stroke-width="1" opacity="0.3"/>
  
  <!-- Small diamond accent on line -->
  <polygon points="395,97 400,100 395,103 390,100" fill="#b8860b" opacity="0.4"/>
</svg>