<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - TrophyCraft</title>
  <link rel="icon" type="img/jpg" href="img/logo.jpg">
  <meta name="description" content="Create your TrophyCraft account to manage orders, track shipments, and access exclusive features.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="tailwindcss.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: var(--bg-section);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .dark-toggle-corner {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .auth-page {
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
    }

    .auth-card {
      position: relative;
      overflow: hidden;
      background: var(--bg-card);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      border: 1px solid var(--border-color);
      transition: background 0.3s, box-shadow 0.3s, border-color 0.3s;
    }

    .dark .auth-card {
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--primary));
    }

    .auth-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .auth-header .logo-link {
      display: inline-block;
      text-decoration: none;
      margin-bottom: 16px;
      transition: transform 0.3s ease;
    }

    .auth-header .logo-link:hover {
      transform: scale(1.05);
    }

    .auth-header .logo-link span {
      font-weight: 800;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #b8860b, #e8c25e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .auth-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .auth-header p {
      color: #888;
      font-size: 0.9rem;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: var(--bg-section);
      color: var(--text-dark);
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .icon-btn:hover {
      background: var(--primary);
      color: white;
    }

    .social-login {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .social-login button {
      flex: 1;
      padding: 10px 0;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background: var(--bg-light);
      color: var(--text-dark);
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .social-login button:hover {
      background: var(--bg-section);
      border-color: var(--primary);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 20px 0;
      color: #888;
      font-size: 0.85rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .form-group {
      margin-bottom: 18px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-dark);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 14px;
      color: #999;
      font-size: 0.95rem;
      pointer-events: none;
      transition: color 0.2s;
      z-index: 1;
    }

    .input-wrapper .toggle-pw {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      transition: color 0.2s;
    }

    .input-wrapper .toggle-pw:hover {
      color: var(--primary);
    }

    .form-control {
      width: 100%;
      padding: 12px 40px 12px 42px;
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      font-size: 0.95rem;
      background: var(--bg-light);
      color: var(--text-dark);
      transition: all 0.2s;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(184,134,11,0.15);
    }

    .form-control.error {
      border-color: #dc2626;
      box-shadow: 0 0 0 3px rgba(220,38,38,0.1);
    }

    .form-control.success {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
    }

    .field-error {
      font-size: 0.78rem;
      color: #dc2626;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.25s, max-height 0.25s;
    }

    .field-error.visible {
      opacity: 1;
      max-height: 30px;
      margin-top: 4px;
    }

    .nav-btn-primary {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .nav-btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: var(--shadow-gold);
    }

    .nav-btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .nav-btn-primary .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .nav-btn-primary.loading .spinner { display: inline-block; }
    .nav-btn-primary.loading .btn-text { display: none; }
    .nav-btn-primary.loading .btn-icon { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-weight: normal;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] {
      margin-top: 3px;
      accent-color: var(--primary);
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .checkbox-group a {
      color: var(--primary);
      text-decoration: none;
    }

    .checkbox-group a:hover {
      text-decoration: underline;
    }

    .pw-strength-bar {
      height: 4px;
      border-radius: 4px;
      margin-top: 8px;
      background: var(--border-color);
      overflow: hidden;
      transition: opacity 0.3s;
    }

    .pw-strength-bar .fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.35s ease, background 0.35s ease;
    }

    .pw-strength-label {
      font-size: 0.78rem;
      margin-top: 4px;
      display: flex;
      justify-content: space-between;
      color: var(--text-dark);
    }

    .pw-strength-label span:last-child {
      font-weight: 600;
    }

    .pw-checklist {
      margin-top: 10px;
      padding: 12px 14px;
      background: var(--bg-section);
      border-radius: 10px;
      border: 1px solid var(--border-color);
      font-size: 0.8rem;
      display: none;
    }

    .pw-checklist.visible { display: block; }

    .pw-checklist li {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      color: #999;
      transition: color 0.2s;
    }

    .pw-checklist li:last-child { margin-bottom: 0; }

    .pw-checklist li.met { color: #16a34a; }

    .pw-checklist li i { width: 14px; font-size: 0.7rem; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-card);
      color: var(--text-dark);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 14px 28px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.35s, transform 0.35s;
      z-index: 999;
      pointer-events: none;
    }

    .dark .toast {
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success i { color: #16a34a; }
    .toast.error i { color: #dc2626; }

    .auth-footer {
      text-align: center;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--border-color);
    }

    .auth-footer p {
      color: #888;
      font-size: 0.88rem;
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 28px 20px;
      }
      .social-login {
        flex-direction: column;
      }
      .social-login button {
        padding: 10px;
        font-size: 0.85rem;
      }
      .auth-header .logo-link span {
        font-size: 1.1rem;
      }
      .auth-header h2 {
        font-size: 1.3rem;
      }
    }

    @media (max-width: 360px) {
      .auth-card {
        padding: 20px 16px;
      }
      .auth-page {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="dark-toggle-corner">
    <button class="icon-btn" id="darkModeToggleAuth" aria-label="Toggle dark mode" title="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>
    <button class="icon-btn" id="rtlToggleAuth" aria-label="Toggle RTL layout" title="Toggle RTL layout">
      <i class="fas fa-exchange-alt"></i>
    </button>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo-link" aria-label="Go to homepage">
          <span>Trophy<span style="background: linear-gradient(135deg, #e8c25e, #b8860b); -webkit-background-clip: text; background-clip: text; color: transparent;">Craft</span></span>
        </a>
        <h2>Create Account</h2>
        <p>Join TrophyCraft today</p>
      </div>

      <div class="social-login">
        <button type="button"><i class="fab fa-google"></i> Google</button>
        <button type="button"><i class="fab fa-facebook-f"></i> Facebook</button>
        <button type="button"><i class="fab fa-apple"></i> Apple</button>
      </div>

      <div class="divider">or sign up with email</div>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <div class="input-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="signupName" class="form-control" placeholder="John Doe" required autocomplete="name">
          </div>
          <div class="field-error" id="nameError"><i class="fas fa-exclamation-circle"></i> <span></span></div>
        </div>

        <div class="form-group">
          <label for="signupEmail">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="signupEmail" class="form-control" placeholder="john@example.com" required autocomplete="email">
          </div>
          <div class="field-error" id="emailError"><i class="fas fa-exclamation-circle"></i> <span></span></div>
        </div>

        <div class="form-group">
          <label for="signupPassword">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="signupPassword" class="form-control" placeholder="Min. 8 characters" required autocomplete="new-password">
            <button type="button" class="toggle-pw" data-target="signupPassword" tabindex="-1" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="field-error" id="passwordError"><i class="fas fa-exclamation-circle"></i> <span></span></div>
          <div class="pw-strength-bar"><div class="fill" id="pwStrengthFill"></div></div>
          <div class="pw-strength-label">
            <span>Password strength</span>
            <span id="pwStrengthText">None</span>
          </div>
          <ul class="pw-checklist" id="pwChecklist">
            <li id="checkLength"><i class="fas fa-circle"></i> At least 8 characters</li>
            <li id="checkUpper"><i class="fas fa-circle"></i> One uppercase letter</li>
            <li id="checkLower"><i class="fas fa-circle"></i> One lowercase letter</li>
            <li id="checkNumber"><i class="fas fa-circle"></i> One number</li>
            <li id="checkSymbol"><i class="fas fa-circle"></i> One special character (!@#$%^&*)</li>
          </ul>
        </div>

        <div class="form-group">
          <label for="signupConfirm">Confirm Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="signupConfirm" class="form-control" placeholder="Confirm your password" required autocomplete="new-password">
            <button type="button" class="toggle-pw" data-target="signupConfirm" tabindex="-1" aria-label="Toggle confirm password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="field-error" id="confirmError"><i class="fas fa-exclamation-circle"></i> <span></span></div>
        </div>

        <div class="form-group">
          <label class="checkbox-group">
            <input type="checkbox" id="termsCheck" required>
            <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
          </label>
          <div class="field-error" id="termsError"><i class="fas fa-exclamation-circle"></i> <span></span></div>
        </div>

        <button type="submit" class="nav-btn-primary" id="signupBtn">
          <i class="fas fa-user-plus btn-icon"></i>
          <span class="btn-text">Create Account</span>
          <span class="spinner"></span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Sign In</a></p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMsg">Success!</span>
  </div>

  <script>
    (function () {
      'use strict';

      var body = document.body;
      var darkToggle = document.getElementById('darkModeToggleAuth');

      function applyTheme(dark) {
        if (dark) {
          body.classList.add('dark');
          darkToggle.innerHTML = '<i class="fas fa-sun"></i>';
        } else {
          body.classList.remove('dark');
          darkToggle.innerHTML = '<i class="fas fa-moon"></i>';
        }
      }

      var storedTheme = localStorage.getItem('trophyTheme');
      if (storedTheme === 'dark') { applyTheme(true); }

      darkToggle.addEventListener('click', function () {
        var nowDark = !body.classList.contains('dark');
        applyTheme(nowDark);
        localStorage.setItem('trophyTheme', nowDark ? 'dark' : 'light');
      });

      var rtlToggle = document.getElementById('rtlToggleAuth');
      var htmlEl = document.documentElement;
      var savedDir = localStorage.getItem('trophyDir');
      if (savedDir === 'rtl') {
        htmlEl.setAttribute('dir', 'rtl');
        htmlEl.setAttribute('lang', 'ar');
      }
      if (rtlToggle) {
        rtlToggle.addEventListener('click', function () {
          var isRtl = htmlEl.getAttribute('dir') === 'rtl';
          if (isRtl) {
            htmlEl.setAttribute('dir', 'ltr');
            htmlEl.setAttribute('lang', 'en');
            localStorage.setItem('trophyDir', 'ltr');
          } else {
            htmlEl.setAttribute('dir', 'rtl');
            htmlEl.setAttribute('lang', 'ar');
            localStorage.setItem('trophyDir', 'rtl');
          }
        });
      }

      document.querySelectorAll('.toggle-pw').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var targetId = this.getAttribute('data-target');
          var inp = document.getElementById(targetId);
          var icon = this.querySelector('i');
          if (inp.type === 'password') {
            inp.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
          } else {
            inp.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
          }
        });
      });

      var form = document.getElementById('signupForm');
      var nameInput = document.getElementById('signupName');
      var emailInput = document.getElementById('signupEmail');
      var pwInput = document.getElementById('signupPassword');
      var confirmInput = document.getElementById('signupConfirm');
      var termsCheck = document.getElementById('termsCheck');
      var submitBtn = document.getElementById('signupBtn');
      var toast = document.getElementById('toast');
      var toastMsg = document.getElementById('toastMsg');

      var nameError = document.getElementById('nameError');
      var emailError = document.getElementById('emailError');
      var pwError = document.getElementById('passwordError');
      var confirmError = document.getElementById('confirmError');
      var termsError = document.getElementById('termsError');

      var pwFill = document.getElementById('pwStrengthFill');
      var pwText = document.getElementById('pwStrengthText');
      var pwChecklist = document.getElementById('pwChecklist');

      var checkLength = document.getElementById('checkLength');
      var checkUpper = document.getElementById('checkUpper');
      var checkLower = document.getElementById('checkLower');
      var checkNumber = document.getElementById('checkNumber');
      var checkSymbol = document.getElementById('checkSymbol');

      function setError(el, msg) {
        var span = el.querySelector('span');
        span.textContent = msg;
        el.classList.add('visible');
      }

      function clearError(el) {
        el.classList.remove('visible');
      }

      function validateName() {
        var val = nameInput.value.trim();
        if (!val) { setError(nameError, 'Full name is required'); nameInput.classList.add('error'); nameInput.classList.remove('success'); return false; }
        if (val.length < 2) { setError(nameError, 'Name must be at least 2 characters'); nameInput.classList.add('error'); nameInput.classList.remove('success'); return false; }
        clearError(nameError);
        nameInput.classList.remove('error');
        nameInput.classList.add('success');
        return true;
      }

      function validateEmail() {
        var val = emailInput.value.trim();
        if (!val) { setError(emailError, 'Email address is required'); emailInput.classList.add('error'); emailInput.classList.remove('success'); return false; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) { setError(emailError, 'Please enter a valid email address'); emailInput.classList.add('error'); emailInput.classList.remove('success'); return false; }
        clearError(emailError);
        emailInput.classList.remove('error');
        emailInput.classList.add('success');
        return true;
      }

      function getPasswordStrength(pw) {
        var score = 0;
        if (pw.length >= 8) score++;
        if (/[a-z]/.test(pw)) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/\d/.test(pw)) score++;
        if (/[^a-zA-Z0-9]/.test(pw)) score++;
        return score;
      }

      function updatePasswordUI() {
        var pw = pwInput.value;
        var score = getPasswordStrength(pw);

        var pct = 0, label = 'None', color = 'var(--border-color)';
        if (pw.length > 0) {
          if (score <= 1) { pct = 20; label = 'Weak'; color = '#dc2626'; }
          else if (score === 2) { pct = 40; label = 'Fair'; color = '#f97316'; }
          else if (score === 3) { pct = 60; label = 'Good'; color = '#f59e0b'; }
          else if (score === 4) { pct = 80; label = 'Strong'; color = '#84cc16'; }
          else { pct = 100; label = 'Very Strong'; color = '#16a34a'; }
        }
        pwFill.style.width = pct + '%';
        pwFill.style.background = color;
        pwText.textContent = label;

        function toggleCheck(el, met) {
          el.classList.toggle('met', met);
          el.querySelector('i').className = met ? 'fas fa-check-circle' : 'fas fa-circle';
        }
        toggleCheck(checkLength, pw.length >= 8);
        toggleCheck(checkUpper, /[A-Z]/.test(pw));
        toggleCheck(checkLower, /[a-z]/.test(pw));
        toggleCheck(checkNumber, /\d/.test(pw));
        toggleCheck(checkSymbol, /[^a-zA-Z0-9]/.test(pw));

        if (pw.length > 0) {
          pwChecklist.classList.add('visible');
        } else {
          pwChecklist.classList.remove('visible');
        }
      }

      function validatePassword() {
        var pw = pwInput.value;
        if (!pw) { setError(pwError, 'Password is required'); pwInput.classList.add('error'); pwInput.classList.remove('success'); return false; }
        if (pw.length < 8) { setError(pwError, 'Password must be at least 8 characters'); pwInput.classList.add('error'); pwInput.classList.remove('success'); return false; }
        if (!/[A-Z]/.test(pw)) { setError(pwError, 'Add an uppercase letter'); pwInput.classList.add('error'); pwInput.classList.remove('success'); return false; }
        if (!/[a-z]/.test(pw)) { setError(pwError, 'Add a lowercase letter'); pwInput.classList.add('error'); pwInput.classList.remove('success'); return false; }
        if (!/\d/.test(pw)) { setError(pwError, 'Add a number'); pwInput.classList.add('error'); pwInput.classList.remove('success'); return false; }
        clearError(pwError);
        pwInput.classList.remove('error');
        pwInput.classList.add('success');
        return true;
      }

      function validateConfirm() {
        if (!confirmInput.value) { setError(confirmError, 'Please confirm your password'); confirmInput.classList.add('error'); confirmInput.classList.remove('success'); return false; }
        if (confirmInput.value !== pwInput.value) { setError(confirmError, 'Passwords do not match'); confirmInput.classList.add('error'); confirmInput.classList.remove('success'); return false; }
        clearError(confirmError);
        confirmInput.classList.remove('error');
        confirmInput.classList.add('success');
        return true;
      }

      function validateTerms() {
        if (!termsCheck.checked) { setError(termsError, 'You must agree to the Terms & Privacy Policy'); return false; }
        clearError(termsError);
        return true;
      }

      nameInput.addEventListener('blur', validateName);
      nameInput.addEventListener('input', function () {
        if (this.classList.contains('error') || this.classList.contains('success')) validateName();
      });
      emailInput.addEventListener('blur', validateEmail);
      emailInput.addEventListener('input', function () {
        if (this.classList.contains('error') || this.classList.contains('success')) validateEmail();
      });
      pwInput.addEventListener('input', function () {
        updatePasswordUI();
        if (this.classList.contains('error') || this.classList.contains('success')) validatePassword();
        if (confirmInput.value) validateConfirm();
      });
      confirmInput.addEventListener('input', function () {
        if (this.classList.contains('error') || this.classList.contains('success') || pwInput.value) validateConfirm();
      });
      termsCheck.addEventListener('change', function () {
        if (this.checked) clearError(termsError);
      });

      var toastTimer = null;
      function showToast(msg, type) {
        toastMsg.textContent = msg;
        toast.className = 'toast ' + type + ' show';
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(function () {
          toast.classList.remove('show');
        }, 3500);
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        var validName = validateName();
        var validEmail = validateEmail();
        var validPw = validatePassword();
        var validConfirm = validateConfirm();
        var validTerms = validateTerms();

        if (!validName || !validEmail || !validPw || !validConfirm || !validTerms) {
          showToast('Please fix the errors above', 'error');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.classList.add('loading');

        var delay = 1800 + Math.random() * 1200;
        setTimeout(function () {
          submitBtn.disabled = false;
          submitBtn.classList.remove('loading');
          showToast('Account created successfully! Welcome to TrophyCraft.', 'success');
          form.reset();
          pwFill.style.width = '0%';
          pwText.textContent = 'None';
          pwChecklist.classList.remove('visible');
          document.querySelectorAll('.form-control').forEach(function (el) {
            el.classList.remove('success', 'error');
          });
          document.querySelectorAll('.field-error').forEach(function (el) {
            el.classList.remove('visible');
          });
        }, delay);
      });

      updatePasswordUI();
    })();
  </script>
</body>
</html>
